<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="description" content="Create a Learn & Get account to track your learning and projects." />
<title>Learn & Get | Sign Up</title>
    <link rel="stylesheet" href="/learn-get/assets/theme.css" />
    <link rel="stylesheet" href="/learn-get/navbar/style.css" />
    <link rel="stylesheet" href="/learn-get/footer/style.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div data-include="/learn-get/navbar/index.html"></div>

    <main class="page" id="main-content">
  <section class="form-wrap">
    <div class="form-card large">

      <h1>Create your account</h1>
      <p>Fill all information to start learning.</p>

      <!-- PERSONAL DETAILS -->
      <h3 class="section-title">Personal Information</h3>

      <div class="field">
        <label>Full Name</label>
        <input type="text" placeholder="Maaz Younas">
      </div>

      <div class="field">
        <label>Father Name</label>
        <input type="text" placeholder="Muhammad Younas">
      </div>

      <div class="field">
        <label>Date of Birth</label>
        <input type="date">
      </div>

      <div class="field">
        <label>Gender</label>
        <select>
          <option>Select Gender</option>
          <option>Male</option>
          <option>Female</option>
        </select>
      </div>


      <!-- CONTACT DETAILS -->
      <h3 class="section-title">Contact Information</h3>

      <div class="field">
        <label>Email</label>
        <input type="email" placeholder="you@gmail.com">
      </div>

      <div class="field">
        <label>Contact Number</label>
        <input type="tel" placeholder="03xxxxxxxxx">
      </div>

      <div class="field">
        <label>Address</label>
        <input type="text" placeholder="Street, City">
      </div>


      <!-- EDUCATIONAL DETAILS -->
      <h3 class="section-title">Educational Information</h3>

      <div class="field">
        <label>Qualification</label>
        <select>
          <option>Select Qualification</option>
          <option>Matric</option>
          <option>Intermediate</option>
          <option>Bachelor</option>
          <option>Master</option>
        </select>
      </div>

      <div class="field">
        <label>Field of Study</label>
        <input type="text" placeholder="Computer Science">
      </div>

      <div class="field">
        <label>Institute Name</label>
        <input type="text" placeholder="University / College">
      </div>


      <!-- PASSWORD -->
      <h3 class="section-title">Security</h3>

      <div class="field">
        <label>Password</label>
        <input type="password" placeholder="Create password">
      </div>

      <div class="field">
        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm password">
      </div>

      <button class="primary-btn">Create Account</button>

      <div class="helper-text">
        Already have an account? <a href="/learn-get/login/index.html">Log in</a>
      </div>

    </div>
  </section>
</main>

    <div data-include="/learn-get/footer/index.html"></div>
    <script src="/learn-get/assets/app.js"></script>
    <script src="/learn-get/navbar/script.js"></script>
    <script src="/learn-get/footer/script.js"></script>
    <script src="script.js"></script>
  </body>
</html>
