<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Learn & Get | Login</title>
    <link rel="stylesheet" href="/Learn&Get/assets/theme.css" />
    <link rel="stylesheet" href="../navbar/style.css" />
    <link rel="stylesheet" href="../footer/style.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div data-include="../navbar/index.html"></div>

    <main class="page">
      <section class="form-wrap">
        <div class="form-card">
          <h1>Welcome back</h1>
          <p>Log in to continue your learning journey.</p>

          <div class="field">
            <label for="login-email">Email</label>
            <input id="login-email" type="email" placeholder="you@gmail.com" />
          </div>
          <div class="field">
            <label for="login-password">Password</label>
            <input id="login-password" type="password" placeholder="••••••••" />
          </div>
          <button class="primary-btn" type="button">Log In</button>
          <div class="helper-text">New here? <a href="../signup/index.html">Create an account</a></div>
        </div>
      </section>
    </main>

    <div data-include="../footer/index.html"></div>
    <script src="../assets/app.js"></script>
    <script src="../navbar/script.js"></script>
    <script src="../footer/script.js"></script>
    <script src="script.js"></script>
  </body>
</html>
