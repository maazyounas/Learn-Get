<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Learn & Get | Contact</title>

  <link rel="stylesheet" href="/Learn&Get/assets/theme.css" />
    <link rel="stylesheet" href="../navbar/style.css" />
  <link rel="stylesheet" href="../footer/style.css" />
  <link rel="stylesheet" href="contact.css" />
</head>

<body>
  <div data-include="../navbar/index.html"></div>

  <main class="page">
    <section class="contact-hero">
      <h1>Contact Us</h1>
      <p>Questions, ideas, or feedback? We are happy to hear from you.</p>
    </section>

    <section class="contact-grid">
      <div class="contact-card">
        <h2>Email</h2>
        <p>maazyounas06@gmail.com</p>
      </div>
      <div class="contact-card">
        <h2>Phone</h2>
        <p>+92 321 5326953</p>
      </div>
      <div class="contact-card">
        <h2>Location</h2>
        <p>Remote-first learning team</p>
      </div>
    </section>

    <section class="contact-form">
      <h2>Send a message</h2>
      <form>
        <label class="field">
          <span>Name</span>
          <input type="text" placeholder="Your name" />
        </label>
        <label class="field">
          <span>Email</span>
          <input type="email" placeholder="you@gmail.com" />
        </label>
        <label class="field">
          <span>Message</span>
          <textarea rows="5" placeholder="Tell us how we can help"></textarea>
        </label>
        <button type="submit" class="primary-btn">Send Message</button>
      </form>
    </section>
  </main>

  <div data-include="../footer/index.html"></div>

  <script src="../assets/app.js"></script>
  <script src="../navbar/script.js"></script>
  <script src="../footer/script.js"></script>
  <script src="contact.js"></script>
</body>
</html>
